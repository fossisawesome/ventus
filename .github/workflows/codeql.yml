# Disabled: CodeQL's Kotlin extractor caps at Kotlin <2.3.30, this repo is on 2.4.0.
# Re-enable triggers below once CodeQL adds support.
name: "CodeQL"

on:
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (java)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
          build-mode: manual

      - name: Build app
        run: ./gradlew compileDebugJavaWithJavac --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java"
