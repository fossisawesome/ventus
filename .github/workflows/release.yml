name: Release

# Trigger on version tags (e.g. v1.5.2) or manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI passed for this commit
        uses: actions/github-script@v9
        with:
          script: |
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              head_sha: context.sha,
            });
            const runs = data.workflow_runs;
            if (runs.length === 0) {
              core.setFailed('No CI workflow runs found for this commit.');
              return;
            }
            const failed = runs.filter(run => run.conclusion !== 'success');
            if (failed.length > 0) {
              core.setFailed(`CI did not pass for this commit: ${failed.map(r => `${r.name} (${r.conclusion})`).join(', ')}`);
            }

  create-release:
    needs: check-ci
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}

    steps:
      - uses: actions/checkout@v6

      - name: Create draft release
        id: create-release
        uses: actions/github-script@v9
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `Ventus ${context.ref.replace('refs/tags/', '')}`,
              body: 'See the release notes.',
              draft: true,
              prerelease: false,
            });
            return data.id;
          result-encoding: string

  build-android:
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android build tools
        run: sdkmanager "build-tools;35.0.0"

      # Sign the release APK with a keystore stored as a base64 secret.
      # Set these repo secrets: ANDROID_KEYSTORE_BASE64, ANDROID_KEY_ALIAS,
      # ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_PASSWORD
      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/release.keystore

      - name: Build Android APK
        env:
          ANDROID_SIGNING_KEY_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: chmod +x gradlew && ./gradlew assembleRelease

      - name: Print and publish APK certificate fingerprint
        id: fingerprint
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          APK=$(find app/build/outputs/apk/release -name '*.apk' ! -name '*-unsigned.apk' | head -1)
          [ -n "$APK" ] || { echo "No signed APK found"; exit 1; }
          echo "apk=$APK" >> $GITHUB_OUTPUT
          APKSIGNER=$(find "$ANDROID_SDK_ROOT/build-tools" -name apksigner | sort -V | tail -1)
          FINGERPRINT=$("$APKSIGNER" verify --print-certs "$APK" | grep -i 'SHA-256' | awk '{print $NF}')
          [ -n "$FINGERPRINT" ] || { echo "Could not extract certificate fingerprint"; exit 1; }
          echo "APK SHA-256 certificate fingerprint: $FINGERPRINT"
          EXISTING=$(gh release view "${{ github.ref_name }}" --json body -q .body)
          printf '%s\n\n---\n**APK certificate fingerprint (SHA-256):**\n`%s`\n\nVerify with: `apksigner verify --print-certs ventus.apk`\n' "$EXISTING" "$FINGERPRINT" > "$RUNNER_TEMP/release_notes.md"
          gh release edit "${{ github.ref_name }}" --notes-file "$RUNNER_TEMP/release_notes.md"

      - name: Upload APK to release
        uses: actions/github-script@v9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('fs')
            const path = require('path')
            const apk = '${{ steps.fingerprint.outputs.apk }}'
            if (!apk) throw new Error('No signed APK found — signing may have failed')
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              name: path.basename(apk),
              data: fs.readFileSync(apk),
            })

  publish-release:
    needs: [create-release, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            })
